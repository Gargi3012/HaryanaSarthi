<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - HaryanaSarthi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h2>Login</h2>
      <p>Login to access AI eligibility and personalized opportunities.</p>

      <div class="auth-form">
        <div class="form-group">
          <label for="loginUserId">User ID</label>
          <input id="loginUserId" type="text" placeholder="Enter user ID" />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password" />
        </div>

        <button id="loginBtn" class="btn btn-primary full-width-btn" type="button">
          Login
        </button>

        <div id="authMessage"></div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
