<!DOCTYPE html>
<html lang="en">

<body>

<header class="navbar">
    <div class="nav-left">
      <img src="../../assets/logo.jpeg" alt="HaryanaSarthi" class="nav-logo" />
      <span class="nav-title">HaryanaSarthi</span>
    </div>

    <nav class="nav-links">

        <span>🔍</span>
        <input type="text" placeholder="Search opportunities..." />
      </div>
      <a href="../../auth.html" class="auth-link">Login / Sign up</a>
    </div>
</header>


<main class="page-shell">


<section class="onboarding-card">

<h2>Government Scheme Eligibility</h2>
<p>Select your details to find eligible schemes</p>


<div class="form-group">
<label>Age</label>
<input id="schemeAge" type="number" placeholder="Enter your age">
</div>


<div class="form-group">

<label>Category</label>

<select id="schemeCategory">

<option>All</option>
<option>BPL</option>
<option>Farmer</option>
<option>Street vendor</option>
<option>Micro business</option>
<option>Unorganized</option>
<option>Rural labour</option>
<option>Youth</option>
<option>Unemployed</option>
<option>Artisan</option>
<option>Senior</option>
<option>Widow</option>
<option>Girl child</option>
<option>SC marriage</option>
<option>Family</option>
<option>Pregnant women</option>
<option>Student</option>
<option>SHG women</option>
<option>Household</option>
<option>Rural household</option>
<option>Rural women</option>
<option>Rural connectivity</option>
<option>Rural property</option>
<option>Children</option>
<option>Passengers</option>
<option>Highway users</option>
<option>Coastal economy</option>
<option>Fishermen</option>
<option>Tourists</option>
<option>Pilgrims</option>
<option>SC</option>
<option>Micro enterprise</option>
<option>Micro FPO</option>
<option>MSME</option>
<option>Technology upgrade</option>
<option>Rural entrepreneur</option>
<option>Agri entrepreneur</option>

</select>

</div>


<div class="form-group">

<label>Gender</label>

<select id="schemeGender">
<option>All</option>
<option>Female</option>
<option>Male</option>
</select>

</div>


<div class="form-group">

<label>State</label>

<select id="schemeState">
<option>All India</option>
<option>Haryana</option>
<option>Rural India</option>
<option>Coastal States</option>
</select>

</div>


<button id="checkSchemeEligibility" class="btn btn-primary">
Check Eligibility
</button>

<!-- Quick Switcher -->
<div class="quick-switch-section" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
  <label style="font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 8px;">Want to switch opportunity?</label>
  <select class="opportunity-switcher" onchange="if(this.value) window.location.href=this.value;" style="width: 100%; max-width: 300px; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none;">
    <option value="">Select Opportunity...</option>
    <option value="eligibility_colleges.html">Colleges</option>
    <option value="eligibility_scholarships.html">Scholarships</option>
    <option value="eligibility_jobs.html">Jobs</option>
    <option value="eligibility_exams.html">Exams</option>
    <option value="eligibility_internships.html">Internships</option>
    <option value="eligibility_schemes.html" selected>Schemes</option>
  </select>
</div>

</section>



<section class="section-head">
<h2>Eligible Schemes</h2>
<p>Based on your profile</p>
</section>


<section id="schemeResults">
<p class="muted">Your scheme results will appear here</p>
</section>
